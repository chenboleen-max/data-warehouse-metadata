server:
  port: 8080
  servlet:
    context-path: /api
  # 生产环境启用压缩
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://mysql:3306/kiro_metadata?useUnicode=true&characterEncoding=utf8mb4&useSSL=true&serverTimezone=Asia/Shanghai&connectionCollation=utf8mb4_unicode_ci}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      connection-test-query: SELECT 1
      pool-name: HikariCP-Metadata-Prod
  
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        implicit-strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        use_sql_comments: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        generate_statistics: false
    open-in-view: false
  
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1ms
    
    elasticsearch:
      repositories:
        enabled: true
  
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://elasticsearch:9200}
    username: ${ELASTICSEARCH_USERNAME:}
    password: ${ELASTICSEARCH_PASSWORD:}
    connection-timeout: 10s
    socket-timeout: 60s

# MyBatis-Plus Configuration
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    cache-enabled: true
    lazy-loading-enabled: false
    aggressive-lazy-loading: false
    default-executor-type: reuse
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      insert-strategy: not_null
      update-strategy: not_null
    banner: false
  type-aliases-package: com.kiro.metadata.entity

# JWT Configuration
jwt:
  # 生产环境必须使用环境变量设置强密钥
  # 使用至少 256 位的随机字符串
  secret: ${JWT_SECRET}
  
  # Access Token 过期时间（毫秒）
  # 生产环境建议缩短为 1-2 小时
  expiration: ${JWT_EXPIRATION:3600000}
  
  # Refresh Token 过期时间（毫秒）
  # 默认：7 天
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  
  # Token 签发者
  issuer: kiro-metadata-system
  
  # Token 受众
  audience: kiro-metadata-users

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: false  # 生产环境禁用 Swagger UI
    operations-sorter: method
    tags-sorter: alpha

# Application Configuration
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://yourdomain.com}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
  
  async:
    core-pool-size: 10
    max-pool-size: 20
    queue-capacity: 200
    thread-name-prefix: async-task-
  
  export:
    temp-dir: ${EXPORT_TEMP_DIR:/app/exports}
    retention-days: 7

# Logging Configuration
logging:
  level:
    root: INFO
    com.kiro.metadata: INFO
  file:
    name: /app/logs/kiro-metadata.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 10GB
