server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/kiro_metadata?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      connection-test-query: SELECT 1
      pool-name: HikariCP-Metadata
  
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        implicit-strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        generate_statistics: false
    open-in-view: false
  
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
    
    elasticsearch:
      repositories:
        enabled: true
  
  elasticsearch:
    uris: http://localhost:9200
    username: 
    password: 
    connection-timeout: 5s
    socket-timeout: 30s

# MyBatis-Plus Configuration
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    cache-enabled: true
    lazy-loading-enabled: false
    aggressive-lazy-loading: false
    default-executor-type: reuse
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      insert-strategy: not_null
      update-strategy: not_null
    banner: false
  type-aliases-package: com.kiro.metadata.entity

# JWT Configuration
jwt:
  # JWT 密钥（生产环境必须修改为强密钥）
  # 建议使用至少 256 位的随机字符串
  secret: kiro-metadata-secret-key-change-this-in-production-environment-use-strong-random-key
  
  # Access Token 过期时间（毫秒）
  # 默认：24 小时 = 86400000 毫秒
  expiration: 86400000
  
  # Refresh Token 过期时间（毫秒）
  # 默认：7 天 = 604800000 毫秒
  refresh-expiration: 604800000
  
  # Token 签发者
  issuer: kiro-metadata-system
  
  # Token 受众
  audience: kiro-metadata-users

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

# Application Configuration
app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
  
  async:
    core-pool-size: 5
    max-pool-size: 10
    queue-capacity: 100
    thread-name-prefix: async-task-
  
  export:
    temp-dir: /tmp/kiro-exports
    retention-days: 7
